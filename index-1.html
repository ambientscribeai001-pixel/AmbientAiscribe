// ─── API CLIENT — ALL calls (auth, notes, payments, AI) go through backend ───
function useApi(token) {
  return useCallback(async(method,path,body=null)=>{
    if(DEMO_MODE) throw new Error("Backend not connected. Set BACKEND_URL at the top of index.html.");
    const res = await fetch(`${BACKEND_URL}${path}`,{
      method,
      headers:{"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{})},
      ...(body?{body:JSON.stringify(body)}:{}),
    });
    const d = await res.json();
    if(!res.ok) throw new Error(d.message||`API ${res.status}`);
    return d;
  },[token]);
}

// ─── WAVEFORM ─────────────────────────────────────────────────────────────────
function Waveform({active,playTime,total=60,height=44}){
  const ref=useRef(null),bars=useRef(Array.from({length:48},()=>Math.random()*0.55+0.15)),frame=useRef(0),raf=useRef(null);
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const ctx=c.getContext("2d");
    const draw=()=>{
      const W=c.parentElement?.offsetWidth||300; c.width=W; c.height=height;
      ctx.clearRect(0,0,W,height);
      const bw=W/bars.current.length,pf=total>0&&playTime!=null?playTime/total:-1;
      bars.current.forEach((h,i)=>{
        const a=active?Math.min(1,Math.max(0.05,h+Math.sin(frame.current*0.09+i*0.38)*0.28)):h*0.22;
        const bh=a*height*0.88;
        ctx.fillStyle=pf>=0&&i/bars.current.length<=pf?"#6366f1":active?`rgba(99,102,241,${0.18+a*0.55})`:"#1e2535";
        ctx.beginPath();ctx.roundRect(i*bw+1,(height-bh)/2,Math.max(bw-2,1),bh,2);ctx.fill();
      });
      frame.current++;raf.current=requestAnimationFrame(draw);
    };
    raf.current=requestAnimationFrame(draw);
    return()=>cancelAnimationFrame(raf.current);
  },[active,playTime,total,height]);
  return React.createElement("canvas",{ref,style:{width:"100%",height,borderRadius:8,background:"#0b0e16",border:"1px solid #1e2535",display:"block"}});
}

function ScoreRing({score,size=56}){
  const r=22,c=2*Math.PI*r,d=(score/100)*c,col=score>=80?"#4ade80":score>=60?"#ffb347":"#ff6b6b";
  return React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
    React.createElement("svg",{width:size,height:size,style:{transform:"rotate(-90deg)"}},
      React.createElement("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:"#1e2535",strokeWidth:4}),
      React.createElement("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:col,strokeWidth:4,strokeDasharray:`${d} ${c-d}`,strokeLinecap:"round",style:{transition:"stroke-dasharray 1s ease"}}),
      React.createElement("text",{x:size/2,y:size/2,textAnchor:"middle",dominantBaseline:"central",fill:col,fontSize:12,fontWeight:800,style:{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`}},score)
    ),
    React.createElement("span",{style:{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:"0.06em"}},"Quality")
  );
}

  return React.createElement("div",{style:{position:"fixed",bottom:20,right:20,zIndex:9999,background:bg,border:`1px solid ${bd}`,borderRadius:10,padding:"11px 16px",color:tx,fontSize:13,fontWeight:600,boxShadow:"0 8px 40px rgba(0,0,0,0.7)",maxWidth:340,lineHeight:1.5}},msg);
}

  const showToast=useCallback((msg,type="info")=>setToast({msg,type}),[]);

  useEffect(()=>{
    if(active){timerRef.current=setInterval(()=>setElapsed(s=>s+1),1000);}

    return()=>clearInterval(timerRef.current);
  },[active]);

  const totalDur=encounter?.segments?.slice(-1)[0]?.end||60;
  const conflicts=audit?.conflicts??[];
  const locked=conflicts.length>0&&!override;
  const canSign=!loading&&!!audit&&!locked&&!signed;
  const hasDiff=origDraft&&edited&&Object.keys(SOAP_META).some(k=>(edited[k]||"")!==(origDraft[k]||""));

  const stats={
    sessions:history.length,signed:history.filter(x=>x.signed).length,
    conflicts:history.reduce((a,x)=>a+(x.conflicts||0),0),

  };

  // ── AUTH ──────────────────────────────────────────────────────────────────

  // ── PICK ENCOUNTER ───────────────────────────────────────────────────────
  const pickEncounter=async enc=>{

  // ── PIPELINE — calls backend /api/v1/ai/* routes, never holds an AI key ───
  const runPipeline=async(resumeFrom=null)=>{
    const srcText=inputMode==="type"
      ?Object.entries(typedNote).filter(([,v])=>v.trim()).map(([k,v])=>`[${k.toUpperCase()}]: ${v}`).join("\n")

    if(!resumeFrom) setScribeCmds(cmdsOf(encounter.transcript));
    setLoading(true); setApiErr(""); setFailedPass(null); setView("review");

    let soap=draft, auditResult=audit, cptResult=cpt, dssResult=dss, scoreResult=score;
    const specObj=SPECIALTIES.find(s=>s.id===specialty);

    // ── Pass 1 — SOAP (skip if resuming past it, or if typed mode) ──────────
    if(!resumeFrom || resumeFrom==="soap"){
      try{
        if(inputMode==="type"){
          soap={...typedNote};
          Object.keys(SOAP_META).forEach(k=>{if(!soap[k])soap[k]="Not documented.";});

          setPhase("Pass 1 — Generating SOAP draft…");
          const r1=await api("POST","/api/v1/ai/soap",{
            transcript:srcText,specialty,specialtyLabel:specObj?.label,specialtyFocus:specObj?.focus,
            language,styleProfile,
          });
          soap=r1.soap;
        }
        setDraft(soap); setOrigDraft(soap); setEdited({...soap});
